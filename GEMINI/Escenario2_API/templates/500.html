{% extends 'base.html' %}
{% block title %}Error del Servidor{% endblock %}

{% block content %}
<div class="glass-panel" style="text-align: center; max-width: 600px; margin: 4rem auto; padding: 4rem 2rem;">
    <h1 style="font-size: 6rem; margin-bottom: 1rem; color: var(--danger-color);">500</h1>
    <h2>Error Interno del Servidor</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Algo salió mal de nuestro lado. Por favor intenta de nuevo más tarde.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Volver al Inicio</a>
</div>
{% endblock %}
