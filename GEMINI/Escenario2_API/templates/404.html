{% extends 'base.html' %}
{% block title %}Página no encontrada{% endblock %}

{% block content %}
<div class="glass-panel" style="text-align: center; max-width: 600px; margin: 4rem auto; padding: 4rem 2rem;">
    <h1 style="font-size: 6rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
    <h2>Página no encontrada</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Lo sentimos, no pudimos encontrar la página que estás buscando.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Volver al Inicio</a>
</div>
{% endblock %}
