{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transform transition-all hover:-translate-y-1 hover:shadow-2xl duration-300">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-yellow-50 text-yellow-600 mb-6 ring-8 ring-yellow-50/50">
            <i class="fas fa-key text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Recuperar Contraseña</h2>
        <p class="text-sm text-gray-500 mt-2">Ingresa tu correo y te enviaremos un enlace seguro para restablecerla</p>
    </div>
    <form class="space-y-6" action="" method="POST">
        <div class="space-y-1">
            <label for="email" class="block text-sm font-semibold text-gray-700">Correo Electrónico Registrado</label>
            <div class="relative rounded-md shadow-sm group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-yellow-600 transition-colors">
                    <i class="fas fa-envelope"></i>
                </div>
                <input id="email" name="email" type="email" autocomplete="email" required 
                    class="focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 border bg-gray-50 focus:bg-white transition-all duration-200" 
                    placeholder="tu@correo.com">
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" 
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-yellow-600 hover:bg-yellow-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                Solicitar Restablecimiento
            </button>
        </div>
    </form>
    <div class="mt-8 text-center border-t border-gray-100 pt-6">
        <a href="{{ url_for('main.login') }}" class="font-bold text-sm text-gray-600 hover:text-gray-900 transition-colors inline-flex items-center">
            <i class="fas fa-arrow-left mr-2"></i> Volver al inicio de sesión
        </a>
    </div>
</div>
{% endblock %}
