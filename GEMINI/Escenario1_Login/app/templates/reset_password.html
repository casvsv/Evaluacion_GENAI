{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transform transition-all hover:-translate-y-1 hover:shadow-2xl duration-300">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 text-green-600 mb-6 ring-8 ring-green-50/50">
            <i class="fas fa-unlock-alt text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Nueva Contraseña</h2>
        <p class="text-sm text-gray-500 mt-2">Crea una nueva contraseña segura para tu cuenta</p>
    </div>
    <form class="space-y-6" action="" method="POST">
        <div class="space-y-1">
            <label for="password" class="block text-sm font-semibold text-gray-700">Nueva Contraseña</label>
            <div class="relative rounded-md shadow-sm group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-green-600 transition-colors">
                    <i class="fas fa-lock"></i>
                </div>
                <input id="password" name="password" type="password" required 
                    class="focus:ring-2 focus:ring-green-500 focus:border-green-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 border bg-gray-50 focus:bg-white transition-all duration-200" 
                    placeholder="••••••••">
            </div>
        </div>

        <div class="space-y-1">
            <label for="confirm_password" class="block text-sm font-semibold text-gray-700">Confirmar Nueva Contraseña</label>
            <div class="relative rounded-md shadow-sm group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-green-600 transition-colors">
                    <i class="fas fa-check-circle"></i>
                </div>
                <input id="confirm_password" name="confirm_password" type="password" required 
                    class="focus:ring-2 focus:ring-green-500 focus:border-green-500 block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 border bg-gray-50 focus:bg-white transition-all duration-200" 
                    placeholder="••••••••">
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" 
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                Actualizar Contraseña
            </button>
        </div>
    </form>
</div>
{% endblock %}
