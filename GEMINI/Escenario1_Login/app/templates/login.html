{% extends "base.html" %}
{% block content %}
<div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transform transition-all hover:-translate-y-1 hover:shadow-2xl duration-300">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-indigo-50 text-primary mb-6 ring-8 ring-indigo-50/50">
            <i class="fas fa-sign-in-alt text-2xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Bienvenido de nuevo</h2>
        <p class="text-sm text-gray-500 mt-2">Por favor, ingresa tus credenciales de acceso</p>
    </div>
    <form class="space-y-6" action="" method="POST">
        <div class="space-y-1">
            <label for="email" class="block text-sm font-semibold text-gray-700">Correo Electrónico</label>
            <div class="relative rounded-md shadow-sm group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                    <i class="fas fa-envelope"></i>
                </div>
                <input id="email" name="email" type="email" autocomplete="email" required 
                    class="focus:ring-2 focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 border bg-gray-50 focus:bg-white transition-all duration-200" 
                    placeholder="tu@correo.com">
            </div>
        </div>

        <div class="space-y-1">
            <label for="password" class="block text-sm font-semibold text-gray-700">Contraseña</label>
            <div class="relative rounded-md shadow-sm group">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                    <i class="fas fa-lock"></i>
                </div>
                <input id="password" name="password" type="password" autocomplete="current-password" required 
                    class="focus:ring-2 focus:ring-primary focus:border-primary block w-full pl-10 sm:text-sm border-gray-300 rounded-xl py-3 px-4 border bg-gray-50 focus:bg-white transition-all duration-200" 
                    placeholder="••••••••">
            </div>
        </div>

        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <input id="remember" name="remember" type="checkbox" 
                    class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded cursor-pointer">
                <label for="remember" class="ml-2 block text-sm text-gray-700 cursor-pointer select-none">
                    Recordar mi sesión
                </label>
            </div>

            <div class="text-sm">
                <a href="{{ url_for('main.reset_request') }}" class="font-bold text-primary hover:text-indigo-500 transition-colors">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </div>

        <div class="pt-2">
            <button type="submit" 
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                Iniciar Sesión
            </button>
        </div>
    </form>
    <div class="mt-8 text-center border-t border-gray-100 pt-6">
        <p class="text-sm text-gray-600">
            ¿No tienes cuenta? 
            <a href="{{ url_for('main.register') }}" class="font-bold text-primary hover:text-indigo-500 transition-colors">Regístrate ahora</a>
        </p>
    </div>
</div>
{% endblock %}
